<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>150.172.128 - Cyber Network Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CONFIG TEMA INTEGRASI TEMPLATE --- */
        :root {
            --bg-main: #060609;
            --bg-card: #0c0c14;
            --bg-sidebar: #09090e;
            --border-color: rgba(255, 255, 255, 0.06);
            --race-red: #ff2a4b;
            --race-yellow: #ffb700;
            --text-neon: #00ffaa; 
            --text-muted: #78788a;
            --transition-speed: 0.25s;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Courier New', Courier, monospace; 
        }
        
        body { 
            background-color: var(--bg-main); 
            color: #d8d8e0; 
            padding-top: 95px; 
            overflow-x: hidden; 
        }
        
        /* --- NAVBAR & SIDEBAR TEMPLATE --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: #060609; border-bottom: 2px solid var(--race-red); 
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px; z-index: 1000;
        }
        .navbar-brand { color: var(--race-yellow); font-size: 1.25rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .sys-status { font-size: 0.75rem; font-weight: bold; color: var(--text-neon); display: flex; align-items: center; gap: 6px; margin-right: 20px;}
        .sys-status::before { content: ''; width: 7px; height: 7px; background: var(--text-neon); border-radius: 50%; box-shadow: 0 0 8px var(--text-neon); }
        
        .hamburger { width: 24px; height: 16px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 1001; }
        .hamburger span { display: block; height: 2px; width: 100%; background-color: var(--race-yellow); transition: all var(--transition-speed); }
        .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); background-color: var(--race-red); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background-color: var(--race-red); }

        .sidebar {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background: var(--bg-sidebar); border-right: 2px solid var(--race-red);
            padding: 100px 20px 20px 20px; transition: left var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1); z-index: 999;
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 10px; }
        .sidebar-menu a { 
            color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: bold;
            display: block; padding: 12px 15px; border-radius: 4px; border: 1px solid transparent;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active { color: #fff; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 183, 0, 0.25); border-left: 4px solid var(--race-yellow); }

        /* --- CONTENT WRAPPER --- */
        .wrapper { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px 20px; }
        
        header { 
            background: rgba(12, 12, 20, 0.6); 
            border: 1px solid var(--race-yellow); 
            padding: 20px 25px; 
            border-radius: 6px; 
            margin-bottom: 30px; 
        }
        header h1 { color: var(--race-yellow); font-size: 1.35rem; font-weight: bold; text-transform: uppercase;}
        header p { color: var(--text-muted); font-size: 0.75rem; }

        /* HEADER NAVIGASI INTERNAL (DARI KODE ASLI ANDA) */
        .page-back-header {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            margin-bottom: 20px;
            color: #fff;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--race-yellow);
            font-size: 1rem;
            cursor: pointer;
            transition: transform var(--transition-speed);
        }
        .back-btn:hover { transform: translateX(-3px); }

        /* STRUKTUR CARD & FORM */
        .glass-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 25px; margin-bottom: 20px; }
        
        .red-label-bar {
            background: rgba(255, 42, 75, 0.1);
            border-left: 3px solid var(--race-red);
            color: var(--race-red);
            padding: 12px 15px;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group { position: relative; margin-bottom: 20px; display: flex; align-items: center; }
        
        .dark-input-box { 
            width: 100%; 
            padding: 14px 14px 14px 45px; 
            background: #060609; 
            border: 1px solid var(--border-color); 
            color: #fff; 
            font-size: 0.85rem; 
            font-family: monospace; 
            border-radius: 4px; 
        }
        .dark-input-box:focus { outline: none; border-color: var(--race-yellow); }
        .input-icon { position: absolute; left: 16px; color: var(--text-muted); font-size: 0.95rem; }
        
        .yoshi-btn { 
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            border: 1px solid var(--race-yellow); 
            color: var(--race-yellow); 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            border-radius: 4px; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all var(--transition-speed);
        }
        .yoshi-btn:hover { background: rgba(255, 183, 0, 0.05); box-shadow: 0 0 10px rgba(255, 183, 0, 0.1); }
        .yoshi-btn:disabled { border-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; background: none; }

        /* KOTAK CONTAINER HASIL LOG */
        .log-container {
            margin-top: 20px; 
            background: #060609; 
            border: 1px solid var(--border-color); 
            padding: 20px; 
            border-radius: 6px; 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 15px; 
            color: #fff;
        }
        .result-title {
            font-family: 'Orbitron', sans-serif; 
            font-weight: bold; 
            color: var(--text-neon); 
            margin-bottom: 12px; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 8px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* --- NOTIFICATION TOAST --- */
        .toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #0c0c14; border: 1px solid var(--race-yellow); padding: 12px 24px; color: #fff; z-index: 2000; transition: opacity 0.3s, visibility 0.3s; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; border-radius: 4px; visibility: hidden; opacity: 0; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">Server Telnet Fatxeon</div>
            <div class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <aside class="sidebar" id="sidebarMenu">
        <ul class="sidebar-menu">
             <li><a href="index.html">// tess</a></li>
            <li><a href="sp.html"class="active">// tesss</a></li> 
        </ul>
    </aside>

    <div class="wrapper">
        <header>
            <h1>Cyber Network Tracker</h1>
            <p>[Modul pemetaan koordinat node jaringan dan identifikasi ISP target]</p>
        </header>

        <div id="wifipage" class="page-container">
            
            <div class="glass-card">
                <div class="red-label-bar">
                    <i class="fas fa-wifi"></i> MASUKKAN IP ADDRESS / WIFI IP
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-location-crosshairs input-icon"></i>
                    <input type="text" id="wifiInput" class="dark-input-box" placeholder="Contoh: 8.8.8.8 atau biarkan kosong untuk IP Anda...">
                </div>
                
                <button class="yoshi-btn" id="btnWifi" onclick="trackWifi()">
                    <i class="fas fa-crosshairs"></i> TRACK JARINGAN
                </button>
            </div>
            
            <div class="log-container" id="wifiResultBox" style="display:none;">
                <div class="result-title">NETWORK LOCATIONS:</div>
                <div id="wifiResultContent" style="white-space:pre-wrap; line-height:1.6;"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><i class="fa-solid fa-info-circle"></i><span id="toast-msg">Notification</span></div>

    <script>
        // Fungsi Mekanisme Sidebar & Hamburger Kontrol
        function toggleSidebar() {
            document.getElementById('hamburgerBtn').classList.toggle('active');
            document.getElementById('sidebarMenu').classList.toggle('active');
        }

        // Penyesuaian Fungsi showPopup bawaan script Anda ke Toast bawaan template
        function showPopup(title, message, icon) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            
            toastMsg.innerHTML = `${icon} <strong>${title}</strong>: ${message}`;
            toast.style.visibility = 'visible';
            toast.style.opacity = '1';
            
            setTimeout(() => {
                toast.style.visibility = 'hidden';
                toast.style.opacity = '0';
            }, 3000);
        }

        // Fungsi Global Navigator placeholder agar aman dari uncaught error
        function switchPage(page) {
            console.log(`[Navigation] Redirecting back to: ${page}`);
        }
        function addToHistory(type, desc) {
            console.log(`[Log Saved] ${type} -> ${desc}`);
        }

        // --- CORE TRACKER FUNCTION (FUNGSI ASLI ANDA) ---
        async function trackWifi() {
            const input = document.getElementById('wifiInput').value.trim();
            const btn = document.getElementById('btnWifi');
            const resBox = document.getElementById('wifiResultBox');
            const resContent = document.getElementById('wifiResultContent');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> TRACKING...';
            resBox.style.display = 'none';

            // Menggunakan HTTPS secara aman agar tidak di-block Mixed Content oleh browser modern
            let url = 'https://ipapi.co/json/';
            if (input) {
                url = `https://ipapi.co/${input}/json/`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();

                // Validasi data berdasarkan struktur respons ipapi.co
                if (!data.error) {
                    let res = `• IP Target   : ${data.ip}\n`;
                    res += `• Negara      : ${data.country_name} (${data.country_code})\n`;
                    res += `• Region      : ${data.region}\n`;
                    res += `• Kota        : ${data.city}\n`;
                    res += `• ISP         : ${data.org}\n`;
                    res += `• Organisasi  : ${data.asn || '-'}\n`;
                    res += `• AS Number   : ${data.asn || '-'}\n`;
                    res += `• Latitude    : ${data.latitude}\n`;
                    res += `• Longitude   : ${data.longitude}\n`;
                    res += `• Timezone    : ${data.timezone}`;

                    resContent.innerText = res;
                    resBox.style.display = 'block';
                    showPopup('Success', 'Pelacakan Jaringan Berhasil!', '✅');
                    addToHistory('Track Network', `IP: ${data.ip} - ${data.city}`);
                } else {
                    showPopup('Gagal', 'IP Address salah atau tidak ditemukan!', '❌');
                }
            } catch (err) {
                console.error(err);
                showPopup('Error', 'Gagal memproses pelacakan network', '⚠️');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-crosshairs"></i> TRACK JARINGAN';
            }
        }
    </script>
</body>
</html>
