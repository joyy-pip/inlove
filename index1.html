<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archive 04.04</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --accent-red: #ff4d4d;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark); color: white;
            font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden;
            height: 100vh; width: 100vw; position: fixed;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1s ease;
        }
        .system-card { width: 90%; max-width: 340px; background: #121212; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .video-container { width: 100%; height: 190px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .status-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .status-text { font-size: 10px; color: #555; letter-spacing: 1.5px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 6px; height: 6px; background: var(--accent-red); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .percentage { font-size: 10px; color: white; font-weight: 700; }
        .progress-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #progress-bar-fill { width: 0%; height: 100%; background: var(--accent-red); }

        /* FLOATING BACK TO DASHBOARD BUTTON */
        .btn-back-dashboard {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px; border-radius: 30px; color: #fff; font-size: 11px;
            text-decoration: none; font-weight: bold; letter-spacing: 1px; z-index: 4500;
            backdrop-filter: blur(10px); transition: background 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-back-dashboard:hover { background: var(--accent-red); border-color: transparent; }

        /* SCENES & CONTENTS */
        #app { width: 100%; height: 100%; }
        .scene { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.8s ease; }
        .scene.active { opacity: 1; visibility: visible; }
        
        .hint-swipe { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 8px; color: #555; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="system-card">
            <div class="video-container">
                <video id="intro-video" muted playsinline autoplay loop>
                    <source src="https://d.top4top.io/m_3763gmep90.mp4" type="video/mp4">
                </video>
            </div>
            <div class="status-container">
                <div class="status-text">
                    <div class="status-dot"></div> SYSTEM LOADING
                </div>
                <div class="percentage" id="load-pct">0%</div>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <a href="dashboard.html" class="btn-back-dashboard">
        <i class="fa-solid fa-arrow-left"></i> KEMBALI KE DASHBOARD
    </a>

    <div id="app">
        <div class="scene active" onclick="startExplore()">
            <div style="text-align: center; cursor: pointer;">
                <h1 style="font-family: 'Playfair Display'; font-size: 3.5rem;">2026<br>04.04</h1>
                <p style="opacity: 0.4; font-size: 11px; margin-top: 15px; letter-spacing: 3px;">TAP TO EXPLORE</p>
            </div>
        </div>
        
        <div class="scene" id="content-scene">
            <div style="text-align: center; padding: 20px;">
                <h2 style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-bottom: 10px;">Archive Fitur 04.04</h2>
                <p style="font-size: 13px; color: #aaa;">Konten album foto collage atau fitur pelacak Anda berjalan sukses disini.</p>
            </div>
        </div>
    </div>

    <div class="hint-swipe">BY BJORKNISM</div>

    <script>
        // Simulasi loading otomatis agar lancar tanpa crash fungsi media
        let progress = 0;
        const fill = document.getElementById('progress-bar-fill');
        const pct = document.getElementById('load-pct');
        const loader = document.getElementById('loading-screen');

        const interval = setInterval(() => {
            progress += 5;
            fill.style.width = progress + '%';
            pct.innerText = progress + '%';
            if(progress >= 100){
                clearInterval(interval);
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 1000);
                }, 500);
            }
        }, 100);

        function startExplore() {
            const scenes = document.querySelectorAll('.scene');
            scenes[0].classList.remove('active');
            scenes[1].classList.add('active');
        }
    </script>
</body>
</html>
