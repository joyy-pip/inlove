<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Killua - Access Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- Memasukkan CryptoJS untuk Dekripsi Kunci -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    /* ================= RESET & BASE ================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background: #000000;
      color: #E0E0E0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* ================= BACKGROUND: FALLING STARS ================= */
    .star-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      transform: rotate(45deg);
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      top: -10%;
      left: 50%;
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, #fff, transparent);
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
      animation: meteor 3s linear infinite;
      opacity: 0;
    }

    .star::before {
      content: '';
      position: absolute;
      transform: translateY(-50%);
      top: 50%;
      width: 300px;
      height: 1px;
      background: linear-gradient(90deg, #fff, transparent);
    }

    @keyframes meteor {
      0% { transform: rotate(180deg) translateX(0); opacity: 1; }
      70% { opacity: 1; }
      100% { transform: rotate(180deg) translateX(-1000px); opacity: 0; }
    }

    .star:nth-child(1) { top: 0; right: 0; left: auto; animation-delay: 0s; animation-duration: 2.5s; }
    .star:nth-child(2) { top: 20%; right: 20%; left: auto; animation-delay: 0.5s; animation-duration: 3s; }
    .star:nth-child(3) { top: 10%; right: 50%; left: auto; animation-delay: 1.2s; animation-duration: 2s; }
    .star:nth-child(4) { top: 50%; right: 10%; left: auto; animation-delay: 1.8s; animation-duration: 2.2s; }
    .star:nth-child(5) { top: 30%; right: 80%; left: auto; animation-delay: 2.5s; animation-duration: 3.5s; }

    /* ================= WRAPPERS (Views) ================= */
    .view-container {
        width: 100%;
        max-width: 380px;
        padding: 20px;
        position: relative;
        z-index: 10;
        display: none;
        animation: fadeIn 0.5s ease;
    }
    
    .view-container.active {
        display: block;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ================= VIEW 1: HOME MENU ================= */
    .top-bar {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
        padding: 0 10px;
    }

    .welcome-badge {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 12px;
        font-family: 'Orbitron';
        color: #ddd;
    }

    .banner-card {
        position: relative;
        width: 100%;
        height: 200px;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        margin-bottom: 30px;
    }

    .banner-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.5);
    }

    .menu-btn {
        width: 100%;
        padding: 16px;
        margin-bottom: 15px;
        background: rgba(30, 30, 40, 0.8);
        border: 1px solid rgba(60, 60, 100, 0.5);
        border-radius: 12px;
        color: #e0e0e0;
        font-family: 'Rajdhani', sans-serif;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: 0.3s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .menu-btn:hover {
        background: rgba(50, 50, 80, 0.9);
        border-color: #00e5ff;
        color: #fff;
        transform: translateY(-2px);
    }

    /* ================= VIEW 2: LOGIN FORM ================= */
    .login-container {
        background: rgba(10, 15, 20, 0.85);
        border: 1px solid rgba(0, 229, 255, 0.1);
        border-radius: 25px;
        padding: 40px 25px;
        text-align: center;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        position: relative;
    }

    .profile-img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #00e5ff;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        margin-bottom: 15px;
    }

    .login-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 22px;
        color: #fff;
        margin-bottom: 5px;
        letter-spacing: 1px;
    }

    .login-subtitle {
        font-size: 12px;
        color: #777;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .input-field-group {
        position: relative;
        margin-bottom: 20px;
        text-align: left;
    }

    .input-style {
        width: 100%;
        padding: 15px 45px;
        background: #050a10;
        border: 1px solid #1f2a36;
        border-radius: 12px;
        color: #fff;
        font-family: 'Rajdhani', sans-serif;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    .input-style:focus {
        border-color: #00e5ff;
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
    }

    .input-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #00e5ff;
        font-size: 16px;
    }

    .toggle-pass {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #555;
        cursor: pointer;
    }

    .submit-btn {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        background: linear-gradient(90deg, #0093E9, #00e5ff);
        border: none;
        border-radius: 12px;
        color: #fff;
        font-family: 'Orbitron', sans-serif;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 1px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        transition: 0.3s;
    }

    .submit-btn:hover {
        transform: scale(1.02);
        box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
    }

    /* ================= VIEW 3: LOADING SCREEN ================= */
    .loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        z-index: 3000;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .video-wrapper {
        width: 90%;
        max-width: 500px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        margin-bottom: 30px; 
    }

    .loading-video {
        width: 100%;
        height: auto;
        display: block;
    }

    .loading-text {
        font-family: 'Orbitron', sans-serif;
        font-size: 20px;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 3px;
        animation: pulse 1.5s infinite;
        margin-top: 20px;
    }

    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

    /* ================= POPUP ================= */
    #customPopup {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(255, 0, 0, 0.85); color: white; padding: 12px 25px;
        border-radius: 8px; z-index: 9999; display: none;
        font-family: 'Rajdhani'; font-weight: bold; border: 1px solid red;
        letter-spacing: 1px; box-shadow: 0 0 15px rgba(255,0,0,0.4);
    }
  </style>
</head>
<body>

  <!-- Efek Meteor Jatuh -->
  <div class="star-container">
    <div class="star"></div><div class="star"></div><div class="star"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div>
  </div>

  <!-- Popup Pemberitahuan -->
  <div id="customPopup">Username / Password Salah!</div>

  <!-- VIEW 1: HOME -->
  <div id="view-home" class="view-container active">
    <div class="top-bar">
        <div class="welcome-badge">Welcome Back</div>
    </div>
    <div class="banner-card">
        <img src="https://f.top4top.io/p_3684gb4m40.jpeg" alt="Banner" class="banner-img">
    </div>
    <div class="menu-btn" id="btnLoginNav">
        <i class="fas fa-sign-in-alt"></i> LOGIN ACCESS
    </div>
  </div>

  <!-- VIEW 2: LOGIN AUTH -->
  <div id="view-login" class="view-container">
    <div class="login-container">
        <img src="https://l.top4top.io/p_3683onycp0.jpeg" alt="Profile" class="profile-img">
        <h2 class="login-title">Killua - System</h2>
        <p class="login-subtitle">Please Log-in</p>

        <div class="input-field-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="visUser" class="input-style" placeholder="Username">
        </div>

        <div class="input-field-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="visPass" class="input-style" placeholder="Password">
            <i class="fas fa-eye-slash toggle-pass" id="toggleBtn"></i>
        </div>

        <button class="submit-btn" id="btnLoginSubmit">VERIFY LOGIN</button>
    </div>
  </div>

  <!-- VIEW 3: LOADING ENGINE SCREEN (15 DETIK) -->
  <div id="loadingScreen" class="loading-screen">
    <div class="star-container" style="opacity: 0.5;">
        <div class="star"></div><div class="star"></div><div class="star"></div>
    </div>
    <div class="video-wrapper">
        <video class="loading-video" id="successVideo" playsinline loop muted>
            <source src="https://files.catbox.moe/vin4kf.mp4" type="video/mp4">
        </video>
    </div>
    <div class="loading-text">Killua engine calibrating...</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const viewHome = document.getElementById('view-home');
        const viewLogin = document.getElementById('view-login');
        const loadingScreen = document.getElementById('loadingScreen');
        const video = document.getElementById('successVideo');
        
        const btnLoginNav = document.getElementById('btnLoginNav');
        const btnLoginSubmit = document.getElementById('btnLoginSubmit');
        
        const visUser = document.getElementById('visUser');
        const visPass = document.getElementById('visPass');
        const toggleBtn = document.getElementById('toggleBtn');
        const popup = document.getElementById('customPopup');

        // Detail GitHub Repository milikmu
        const owner = "joyy-pip";
        const repo = "inlove";

        // --- NAVIGATION: HOME KE LOGIN ---
        btnLoginNav.addEventListener('click', () => {
            viewHome.classList.remove('active');
            setTimeout(() => {
                viewHome.style.display = 'none';
                viewLogin.style.display = 'block';
                setTimeout(() => viewLogin.classList.add('active'), 10);
            }, 400);
        });

        // --- PASSWORD VISIBILITY TOGGLE ---
        toggleBtn.addEventListener('click', () => {
            const type = visPass.getAttribute('type') === 'password' ? 'text' : 'password';
            visPass.setAttribute('type', type);
            toggleBtn.classList.toggle('fa-eye');
            toggleBtn.classList.toggle('fa-eye-slash');
        });

        // --- PROSES SUBMIT & VERIFIKASI MULTI-USER ---
        btnLoginSubmit.addEventListener('click', async () => {
            const u = visUser.value.trim();
            const p = visPass.value.trim();

            if(!u || !p) {
                showPopup("Isi Username & Password!");
                return;
            }

            // Gabungkan user + pass sebagai sandi pembuka dekripsi
            const kunciJawaban = u + p;

            // =========================================================================
            // DATA ENKRIPSI GITHUB (Ganti dengan hasil generate Langkah 1 kamu)
            // =========================================================================
            const tokenEnkripsiFree = "U2FsdGVkX18Y53g6DMruYdDsI7n2mAJ5AINvGrj/xSCTQBAmBY5L8BGbSIkAs23nhn4RgFJ4hplgvc2op2anaA=="; 
            const tokenEnkripsiVip = "U2FsdGVkX1+La+tLnh9OnEB8uKdLEvwF2CjHKObx5igO9PAw7lOVw0wdofv+9GvaxYCi78CuUHjAvBXojqtwzA=="; 
            // =========================================================================

            let pathFile = ""; 
            let encryptedTokenSelected = "";

            // Seleksi file target di GitHub berdasarkan Username yang diinput
            if (u === "free") {
                pathFile = "done.html";
                encryptedTokenSelected = tokenEnkripsiFree;
            } else if (u === "vip") {
                pathFile = "sp.html";
                encryptedTokenSelected = tokenEnkripsiVip;
            } else {
                showPopup("Akun Tidak Terdaftar!");
                return;
            }

            try {
                // 1. Dekripsi data Token menggunakan kredensial input
                const bytes = CryptoJS.AES.decrypt(encryptedTokenSelected, kunciJawaban);
                const decryptedToken = bytes.toString(CryptoJS.enc.Utf8);

                // Validasi format token jika enkripsi gagal/salah password
                if (!decryptedToken || !decryptedToken.startsWith("ghp_")) {
                    showPopup("Username atau Password Salah!");
                    return;
                }

                // Sembunyikan Form Login & Nyalakan Video Animasi Mesin Selama 15 Detik
                viewLogin.classList.remove('active');
                viewLogin.style.display = 'none';
                loadingScreen.style.display = 'flex';
                video.play().catch(() => {});

                // 2. Ambil file tujuan secara diam-diam dari GitHub saat video berputar
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${pathFile}`, {
                    headers: {
                        "Authorization": `token ${decryptedToken}`,
                        "Accept": "application/vnd.github.v3.raw"
                    }
                });

                if (response.status === 200) {
                    const isiScriptTujuan = await response.text();

                    // Sisa waktu video berputar diselesaikan (Total 15 detik dari awal klik)
                    setTimeout(() => {
                        video.pause();
                        // Timpa dokumen utama dengan isi file html dari GitHub secara utuh
                        document.open();
                        document.write(isiScriptTujuan);
                        document.close();
                    }, 15000);

                } else {
                    resetToLoginView("Gagal Memuat Sumber Data GitHub!");
                }

            } catch (error) {
                resetToLoginView("Koneksi Error / Gagal Dekripsi!");
            }
        });

        // --- HELPER POPUP ERROR ---
        function showPopup(msg) {
            popup.innerText = msg;
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 3000);
        }

        // --- HELPER RESET JIKA KONEKSI GITHUB ERROR ---
        function resetToLoginView(errorMsg) {
            loadingScreen.style.display = 'none';
            video.pause();
            viewLogin.style.display = 'block';
            viewLogin.classList.add('active');
            showPopup(errorMsg);
        }
    });
  </script>
</body>
</html>
