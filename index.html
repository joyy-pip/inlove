<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #090a0f; /* Latar belakang luar super dark */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Komponen Card Utama */
        .maintenance-card {
            background-color: #12141c; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 16px;
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 50px rgba(250, 204, 21, 0.02);
            overflow: hidden; /* Memastikan animasi garis tetap di dalam radius card */
            position: relative;
        }

        /* Animasi Garis Warning Kuning Bergerak */
        .warning-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%; /* Dibuat lebih lebar agar animasi berjalan mulus */
            height: 6px; /* Ketebalan garis warning */
            background: repeating-linear-gradient(
                -45deg,
                #facc15,
                #facc15 10px,
                #090a0f 10px,
                #090a0f 20px
            );
            animation: move-strip 1.5s linear infinite;
        }

        /* Aksen teks kuning cerah */
        .highlight-text {
            color: #facc15; 
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: inline-block;
            background: rgba(250, 204, 21, 0.07);
            padding: 6px 14px;
            border-radius: 6px;
            margin-top: 10px; /* Jarak aman dari garis warning */
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.3;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
            color: #ffffff;
        }

        p {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* Tombol di dalam Card */
        .btn-status {
            display: inline-block;
            background-color: #ffffff;
            color: #090a0f;
            padding: 14px 32px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            border-radius: 8px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .btn-status:hover {
            background-color: #facc15; 
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 45px;
            font-size: 12px;
            color: #475569;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 25px;
        }

        /* Keyframes untuk menggerakkan garis warning */
        @keyframes move-strip {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-28px); /* Angka ini disesuaikan dengan pattern agar tidak patah */
            }
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="warning-strip"></div>
        
        <span class="highlight-text">Notice // Under Maintenance</span>
        
        <h1>SERVER MAINTENANCE</h1>
        
        <p>Platform saat ini dalam perbaikan terjadwal demi mengoptimalkan database dan kecepatan server. Layanan akan segera kembali Dengan Kejutan Besar.</p>
        
        <a href="#" class="btn-status">Contact Developer</a>

        <div class="footer">
            &copy; 2026 Fatxeon.Official All rights reserved.
        </div>
    </div>

</body>
</html>
